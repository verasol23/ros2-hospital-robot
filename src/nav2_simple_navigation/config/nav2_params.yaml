amcl:
  ros__parameters:
    use_sim_time: true
    alpha1: 0.1
    alpha2: 0.1
    alpha3: 0.1
    alpha4: 0.1
    alpha5: 0.1

    base_frame_id: "base_footprint"
    global_frame_id: "map"
    odom_frame_id: "odom"

    tf_broadcast: true
    transform_tolerance: 1.0

    scan_topic: /scan_front_filtered

    min_particles: 500
    max_particles: 2000

    laser_model_type: "likelihood_field"
    max_beams: 60
    z_hit: 0.5
    z_short: 0.05
    z_max: 0.05
    z_rand: 0.5
    sigma_hit: 0.2
    lambda_short: 0.1
    laser_likelihood_max_dist: 2.0

    update_min_d: 0.10
    update_min_a: 0.10

    resample_interval: 1
    recovery_alpha_slow: 0.0
    recovery_alpha_fast: 0.0

    set_initial_pose: true
    always_reset_initial_pose: true
    initial_pose:
      x: 2.5
      y: 0.1
      z: 0.0
      yaw: -1.5708

    first_map_only: false
    save_pose_rate: 0.5

# -------------------------
# BT Navigator: điều phối toàn bộ Nav2 bằng Behavior Tree
# -------------------------
bt_navigator:
  ros__parameters:
    use_sim_time: true
    global_frame: map          
    robot_base_frame: base_footprint
    odom_topic: /odometry/filtered
    #default_nav_to_pose_bt_xml: "/home/alberthtran/ros2_project/src/nav2_simple_navigation/behavior_tree/smart.xml"
   
# -------------------------
# Planner Server: quyết định global path được tạo thế nào
# -------------------------
planner_server:
  ros__parameters:
    use_sim_time: true
    expected_planner_frequency: 10.0
    planner_plugins: ["GridBased"] # danh sách planner dùng.

    GridBased:
      plugin: "nav2_smac_planner::SmacPlanner2D" # dùng Smac 2D planner.
      tolerance: 0.25          #planner chấp nhận goal gần trong bán kính này
      downsample_costmap: false
      allow_unknown: false     # có cho path xuyên vùng unknown không.
      max_iterations: 1000000 # giới hạn số vòng lặp planner.
      max_planning_time: 3.0   # planner được phép tính trong tối đa 3 s
      cost_travel_multiplier: 5.0  #phạt path đi qua vùng cost cao.
      use_final_approach_orientation: false  #planner có ép hướng cuối bám theo path cuối không


# -------------------------
# Smoother Server
# -------------------------
smoother_server:
  ros__parameters:
    use_sim_time: true
    smoother_plugins: ["SimpleSmoother"]

    SimpleSmoother:
      plugin: "nav2_smoother::SimpleSmoother"
      tolerance: 1.0e-10
      max_its: 1000
      do_refinement: true

# -------------------------
# Controller Server : brain of robot
# -------------------------
controller_server:
  ros__parameters:
    use_sim_time: true
    enable_stamped_cmd_vel: true
    controller_frequency: 20.0
    odom_topic: /odometry/filtered

    controller_plugins: ["FollowPath"]
    #plugin kiểm tra robot có tiến bộ không và goal đã đạt chưa.
    progress_checker_plugins: ["progress_checker"]
    goal_checker_plugins: ["general_goal_checker"]
    #trong 3 s không nhích được ít nhất 10 cm thì coi là stuck
    progress_checker:
      plugin: "nav2_controller::SimpleProgressChecker"
      required_movement_radius: 0.10
      movement_time_allowance: 5.0
    #điều kiện để coi là tới goal.
    general_goal_checker:
      stateful: True # khi đã vào goal region, goal checker xử lý ổn định hơn
      plugin: "nav2_controller::SimpleGoalChecker"
      xy_goal_tolerance: 0.18
      yaw_goal_tolerance: 0.4
    #nếu robot lệch hướng nhiều thì xoay trước, rồi mới giao cho MPPI.
    FollowPath:
      plugin: "nav2_rotation_shim_controller::RotationShimController"
      primary_controller: "nav2_mppi_controller::MPPIController"

      visualize: false
      critic_index_to_visualize: 0
      publish_optimal_trajectory: false

      angular_dist_threshold: 0.38
      angular_disengage_threshold: 0.12
      forward_sampling_distance: 0.45
      rotate_to_heading_angular_vel: 0.22
      max_angular_accel: 0.8
      simulate_ahead_time: 1.0
      rotate_to_goal_heading: false
      rotate_to_heading_once: false
      closed_loop: true
      use_path_orientations: false

      open_loop: false
      time_steps: 56
      model_dt: 0.05
      batch_size: 1100
      iteration_count: 1
      temperature: 0.20
      gamma: 0.015

      motion_model: "Omni"

      vx_std: 0.16
      vy_std: 0.06
      wz_std: 0.16

      vx_max: 0.4
      vx_min: -0.22
      vy_max: 0.10
      vy_min: -0.08
      wz_max: 0.35

      ax_max: 1.3
      ax_min: -1.3
      ay_max: 0.3
      ay_min: -0.3
      az_max: 0.6

      critics: ["ConstraintCritic", "CostCritic", "GoalCritic", "GoalAngleCritic",
                "PathAlignCritic", "PathFollowCritic", "PathAngleCritic", "TwirlingCritic"]

      ConstraintCritic:
        enabled: true
        cost_power: 1
        cost_weight: 4.0

      CostCritic:
        enabled: true
        cost_power: 1
        cost_weight: 3.81
        critical_cost: 300.0
        consider_footprint: true
        collision_cost: 1000000.0
        near_goal_distance: 1.0
        trajectory_point_step: 2

      GoalCritic:
        enabled: true
        cost_power: 1
        cost_weight: 5.0
        threshold_to_consider: 0.6

      GoalAngleCritic:
        enabled: true
        cost_power: 1
        cost_weight: 3.5
        threshold_to_consider: 0.5

      PathAlignCritic:
        enabled: true
        cost_power: 1
        cost_weight: 9.0
        max_path_occupancy_ratio: 0.05
        trajectory_point_step: 4
        threshold_to_consider: 0.5
        offset_from_furthest: 18
        use_path_orientations: false

      PathFollowCritic:
        enabled: true
        cost_power: 1
        cost_weight: 7.0
        offset_from_furthest: 5
        threshold_to_consider: 1.35

      PathAngleCritic:
        enabled: true
        cost_power: 1
        cost_weight: 2.5
        offset_from_furthest: 4
        threshold_to_consider: 0.5
        max_angle_to_furthest: 1.0
        mode: 0

      TwirlingCritic:
        enabled: true
        cost_power: 1
        cost_weight: 8.0
# -------------------------
# Global Costmap (no map)
# -------------------------
global_costmap:
  global_costmap:
    ros__parameters:
      use_sim_time: true
      global_frame: map
      robot_base_frame: base_footprint
      resolution: 0.08
      track_unknown_space: true
      footprint: "[[0.33, 0.23], [0.33, -0.23], [-0.33, -0.23], [-0.33, 0.23]]"

      plugins: ["static_layer", "obstacle_layer", "inflation_layer"]
      filters: ["keepout_filter"]

      static_layer:
        plugin: "nav2_costmap_2d::StaticLayer"
        map_subscribe_transient_local: true

      obstacle_layer:
        plugin: "nav2_costmap_2d::ObstacleLayer"
        observation_sources: scan_rear scan_front

        scan_front:
          topic: /scan_front_filtered
          max_obstacle_height: 2.0
          clearing: true
          marking: true
          data_type: "LaserScan"
          raytrace_max_range: 6.0
          obstacle_max_range: 4.0

        scan_rear:
          topic: /scan_rear_filtered
          max_obstacle_height: 2.0
          clearing: true
          marking: true
          data_type: "LaserScan"
          raytrace_max_range: 6.0
          obstacle_max_range: 4.0

      inflation_layer:
        plugin: "nav2_costmap_2d::InflationLayer"
        inflation_radius: 0.85 # Tăng inflation_radius: path né tường mạnh hơn, Giảm: path dám đi sát hơn.
        cost_scaling_factor: 10.0 #Tăng cost_scaling_factor: cost rơi nhanh hơn theo khoảng cách, Giảm: vùng sợ obstacle lan xa hơn.
        
      keepout_filter: #cấm robot đi vào vùng keepout trên map mask.
        plugin: "nav2_costmap_2d::KeepoutFilter"
        enabled: True
        filter_info_topic: "/costmap_filter_info"
        transform_tolerance: 0.1

  
# -------------------------
# Local Costmap
# -------------------------
local_costmap:
  local_costmap:
    ros__parameters:
      use_sim_time: true
      global_frame: odom
      robot_base_frame: base_footprint
      rolling_window: true
      width: 5
      height: 5
      resolution: 0.05
      footprint: "[[0.33, 0.23], [0.33, -0.23], [-0.33, -0.23], [-0.33, 0.23]]"

      plugins: ["obstacle_layer", "inflation_layer"]

      obstacle_layer:
        plugin: "nav2_costmap_2d::ObstacleLayer"
        observation_sources: scan_front scan_rear 
        scan_front:
          topic: /scan_front_filtered
          max_obstacle_height: 2.0
          min_obstacle_height: 0.1
          clearing: true
          marking: true
          inf_is_valid: true
          data_type: "LaserScan"
          raytrace_max_range: 4.0
          obstacle_max_range: 2.5

        scan_rear:
          topic: /scan_rear_filtered
          max_obstacle_height: 2.0
          min_obstacle_height: 0.1
          clearing: true
          marking: true
          inf_is_valid: true
          data_type: "LaserScan"
          raytrace_max_range: 4.0
          obstacle_max_range: 2.5


      inflation_layer:
        plugin: "nav2_costmap_2d::InflationLayer"
        inflation_radius: 0.42
        cost_scaling_factor: 12.0
# -------------------------
# Recovery Server
# -------------------------

behavior_server:
  ros__parameters:
    use_sim_time: true
    costmap_topic: local_costmap/costmap_raw
    footprint_topic: local_costmap/published_footprint
    cycle_frequency: 10.0
    behavior_plugins: ["spin", "backup", "wait", "drive_on_heading"]
    spin:
      plugin: "nav2_behaviors::Spin"
    backup:
      plugin: "nav2_behaviors::BackUp"
    wait:
      plugin: "nav2_behaviors::Wait"
    drive_on_heading:
      plugin: "nav2_behaviors::DriveOnHeading"
    global_frame: map
    robot_base_frame: base_footprint
    transform_timeout: 0.1
    use_realtime_priority: false
    enable_stamped_cmd_vel: true

# -------------------------
# Lifecycle Manager
# -------------------------
lifecycle_manager:
  ros__parameters:
    use_sim_time: true
    autostart: true

    node_names: [
      "map_server",
      "amcl",
      "planner_server",
      "smoother_server",
      "controller_server",
      "behavior_server",
      "bt_navigator",
      "global_costmap/global_costmap",
      "local_costmap/local_costmap",
      "velocity_smoother",      
      "collision_monitor"
    ]

    bond_timeout: 10.0
    attempt_respawn_reconnection: true
    bond_respawn_max_duration: 10.0

velocity_smoother:
  ros__parameters:
    use_sim_time: true
    smoothing_frequency: 20.0
    feedback: "OPEN_LOOP"
    scale_velocities: false
    enable_stamped_cmd_vel: true

collision_monitor:
  ros__parameters:
    use_sim_time: true
    enabled: True
    base_frame_id: "base_footprint"
    odom_frame_id: "odom"

    cmd_vel_in_topic: "/cmd_vel_nav_smooth"
    cmd_vel_out_topic: "/mobile_base_controller/reference"

    state_topic: "collision_monitor_state"
    transform_tolerance: 0.2
    source_timeout: 0.3
    base_shift_correction: True
    stop_pub_timeout: 0.5
    enable_stamped_cmd_vel: true
    use_realtime_priority: false

    polygons: ["PolygonStop"]   

    PolygonStop:
      type: "polygon"
      points: "[[0.33, 0.23], [0.33, -0.23], [-0.33, -0.23], [-0.33, 0.23]]"
      action_type: "stop"
      min_points: 4            
      enabled: True

    observation_sources: ["scan_front", "scan_rear"]

    scan_front:
      source_timeout: 0.2
      type: "scan"
      topic: "/scan_front_filtered"
      enabled: True

    scan_rear:
      source_timeout: 0.2
      type: "scan"
      topic: "/scan_rear_filtered"
      enabled: True

