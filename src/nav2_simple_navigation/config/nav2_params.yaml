amcl:
  ros__parameters:
    use_sim_time: true
    alpha1: 0.2
    alpha2: 0.2
    alpha3: 0.2
    alpha4: 0.2
    alpha5: 0.2

    base_frame_id: "base_link"
    global_frame_id: "map"
    odom_frame_id: "odom"

    tf_broadcast: true
    transform_tolerance: 1.0

    scan_topic: /scan_front_raw

    min_particles: 500
    max_particles: 2000

    laser_model_type: "likelihood_field"
    max_beams: 60
    z_hit: 0.5
    z_short: 0.05
    z_max: 0.05
    z_rand: 0.5
    sigma_hit: 0.2
    lambda_short: 0.1
    laser_likelihood_max_dist: 2.0

    update_min_d: 0.10
    update_min_a: 0.10

    resample_interval: 1
    recovery_alpha_slow: 0.0
    recovery_alpha_fast: 0.0

    set_initial_pose: false
    always_reset_initial_pose: false

    first_map_only: false
    save_pose_rate: 0.5

# -------------------------
# BT Navigator
# -------------------------
bt_navigator:
  ros__parameters:
    use_sim_time: true
    global_frame: map          
    robot_base_frame: base_link
    odom_topic: /odometry/filtered
    #default_nav_to_pose_bt_xml: "/home/alberthtran/ros2_project/src/nav2_simple_navigation/behavior_tree/drive_in_circle.xml"
   
# -------------------------
# Planner Server
# -------------------------
planner_server:
  ros__parameters:
    use_sim_time: true
    expected_planner_frequency: 10.0

    planner_plugins: ["GridBased"]

    GridBased:
      plugin: "nav2_navfn_planner::NavfnPlanner"
      tolerance: 0.5
      use_astar: false

# -------------------------
# Controller Server (MPPI)
# -------------------------
controller_server:
  ros__parameters:
    use_sim_time: true
    enable_stamped_cmd_vel: true
    controller_frequency: 20.0
    odom_topic: /odometry/filtered

    controller_plugins: ["FollowPath"]

    progress_checker:
      plugin: "nav2_controller::SimpleProgressChecker"
      required_movement_radius: 0.5
      movement_time_allowance: 10.0

    general_goal_checker:
      stateful: True
      plugin: "nav2_controller::SimpleGoalChecker"
      xy_goal_tolerance: 0.25
      yaw_goal_tolerance: 0.25

    FollowPath:
      plugin: "nav2_regulated_pure_pursuit_controller::RegulatedPurePursuitController"
      desired_linear_velocity: 0.5
      lookahead_dist: 0.6       # Crucial: smaller = tighter turns, larger = smoother
      min_lookahead_dist: 0.3
      max_lookahead_dist: 0.9
      lookahead_time: 1.5
      rotate_to_heading_angular_vel: 1.0
      transform_tolerance: 0.1
      use_velocity_scaled_lookahead_dist: true
      min_approach_linear_velocity: 0.05
      approach_velocity_scaling_dist: 0.6
      use_collision_detection: false # Set to false since you're in an empty space
      use_regulated_linear_velocity_scaling: true
      regulated_linear_scaling_min_radius: 0.9
      regulated_linear_scaling_min_speed: 0.1

# -------------------------
# Global Costmap (no map)
# -------------------------
global_costmap:
  global_costmap:
    ros__parameters:
      use_sim_time: true
      global_frame: map
      robot_base_frame: base_link
      resolution: 0.05
      track_unknown_space: true

      plugins: ["static_layer", "inflation_layer"]

      static_layer:
        plugin: "nav2_costmap_2d::StaticLayer"
        map_subscribe_transient_local: true

      inflation_layer:
        plugin: "nav2_costmap_2d::InflationLayer"
        inflation_radius: 0.5
# -------------------------
# Local Costmap
# -------------------------
local_costmap:
  local_costmap:
    ros__parameters:
      use_sim_time: true
      global_frame: odom
      robot_base_frame: base_link
      rolling_window: true
      width: 3
      height: 3
      resolution: 0.05

      plugins: ["obstacle_layer", "inflation_layer"]

      obstacle_layer:
        plugin: "nav2_costmap_2d::ObstacleLayer"
        observation_sources: scan
        scan:
          topic: /scan_front_raw
          max_obstacle_height: 2.0
          clearing: true
          marking: true
          data_type: "LaserScan"
          raytrace_max_range: 10.0
          obstacle_max_range: 8.0

      inflation_layer:
        plugin: "nav2_costmap_2d::InflationLayer"
        inflation_radius: 0.5
# -------------------------
# Recovery Server
# -------------------------

behavior_server:
  ros__parameters:
    use_sim_time: true
    costmap_topic: local_costmap/costmap_raw
    footprint_topic: local_costmap/published_footprint
    cycle_frequency: 10.0
    recovery_plugins: ["spin", "backup", "wait"]
    spin:
      plugin: "nav2_behaviors::Spin"
    backup:
      plugin: "nav2_behaviors::BackUp"
    wait:
      plugin: "nav2_behaviors::Wait"
    global_frame: map
    robot_base_frame: base_link
    transform_timeout: 0.1
    use_realtime_priority: false
    enable_stamped_cmd_vel: true

# -------------------------
# Lifecycle Manager
# -------------------------
lifecycle_manager:
  ros__parameters:
    use_sim_time: true
    autostart: true

    node_names: [
      "map_server",
      "amcl",
      "planner_server",
      "controller_server",
      "behavior_server",
      "bt_navigator",
      "global_costmap/global_costmap",
      "local_costmap/local_costmap"
    ]

    bond_timeout: 10.0
    attempt_respawn_reconnection: true
    bond_respawn_max_duration: 10.0

velocity_smoother:
  ros__parameters:
    use_sim_time: true
    smoothing_frequency: 20.0
    feedback: "OPEN_LOOP"
    scale_velocities: false
    enable_stamped_cmd_vel: true