# Front Lidar Bridge 
- ros_topic_name: "/scan_front_raw"
  gz_topic_name: "/scan_front_raw"
  ros_type_name: "sensor_msgs/msg/LaserScan"
  gz_type_name: "gz.msgs.LaserScan"
  direction: GZ_TO_ROS

# Rear Lidar Bridge 
- ros_topic_name: "/scan_rear_raw"
  gz_topic_name: "/scan_rear_raw"
  ros_type_name: "sensor_msgs/msg/LaserScan"
  gz_type_name: "gz.msgs.LaserScan"
  direction: GZ_TO_ROS

# IMU Bridge (Alternative to the IMU Broadcaster)
- ros_topic_name: "/base_imu"
  gz_topic_name: "/base_imu"
  ros_type_name: "sensor_msgs/msg/Imu"
  gz_type_name: "gz.msgs.IMU"
  direction: GZ_TO_ROS


# Clock
- ros_topic_name: "/clock"
  gz_topic_name: "/clock"
  ros_type_name: "rosgraph_msgs/msg/Clock"
  gz_type_name: "gz.msgs.Clock"
  direction: GZ_TO_ROS